<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>改良メダカ図鑑</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <h1>改良メダカ図鑑</h1>
    <p class="subtitle" id="subtitle">読み込み中…</p>
  </header>

  <main class="container">
    <!-- 交配予測 -->
    <section class="breed-panel">
      <button type="button" class="breed-toggle" id="btnBreed" aria-expanded="false">
        <span class="breed-icon" aria-hidden="true">⚭</span>交配予測をひらく<span class="caret">▾</span>
      </button>
      <div id="breedBody" class="breed-body hidden"></div>
    </section>

    <!-- 検索・絞り込み・並び替え -->
    <section class="controls">
      <input type="search" id="searchBox" placeholder="品種名・よみ・別名で検索…" aria-label="検索">
      <div class="toolbar">
        <button type="button" class="tool-btn" id="btnFilter" aria-expanded="false">絞り込み<span class="caret">▾</span></button>
        <select class="tool-btn" id="selSort" aria-label="並び替え">
          <option value="name">並び替え：よみ順</option>
          <option value="year">並び替え：作出年が新しい順</option>
          <option value="diff">並び替え：飼育難易度が高い順</option>
        </select>
      </div>
      <div id="filterPanel" class="filter-panel hidden"><!-- JS が分類フィルタを生成 --></div>
      <div id="activeChips" class="active-chips"><!-- 適用中のフィルタ --></div>
      <div class="result-count" id="resultCount"></div>
    </section>

    <!-- 一覧（写真カード） -->
    <section id="cardGrid" class="card-grid" aria-live="polite"></section>
  </main>

  <!-- 詳細（モーダル） -->
  <div id="detailModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-body" id="detailBody"></div>
  </div>

  <footer class="site-footer">
    <p>個人利用の学習用図鑑です。写真・情報は各出典元に帰属します。分類は日本メダカ協会（JMA）品種分類マニュアル準拠。</p>
  </footer>

  <!-- データと見た目を分離：データは JS 埋め込み（fetch不使用でローカル起動可）-->
  <script src="data/classification.js"></script>
  <script src="data/medaka-data.js"></script>
  <script src="data/price-history.js"></script>
  <script src="assets/genetics.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
